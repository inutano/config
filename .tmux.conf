# --- General ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g display-time 4000
set -g focus-events on
set -sg escape-time 0

# --- Prefix ---
# Keep default C-b (Moshi has a dedicated C-b button on its keyboard)
set -g prefix C-b
bind C-b send-prefix

# --- Window titles (Moshi displays these in its UI) ---
set -g set-titles on
set -g set-titles-string "#I: #T"

# --- Mouse ---
set -g mouse on

# --- Window/Pane indexing ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Splits (intuitive keys) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# --- Vi mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# --- Pane navigation (vim-like) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane resizing ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# --- Status bar ---
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour248"
set -g status-left "#[fg=colour232,bg=colour39,bold] #S #[default] "
set -g status-left-length 30
set -g status-right ""
set -g status-right-length 0
setw -g window-status-format " #I:#W#F "
setw -g window-status-current-format "#[fg=colour232,bg=colour39,bold] #I:#W#F "

# --- Bell monitoring (highlights tabs when Claude Code needs approval) ---
set -g monitor-bell on
set -g bell-action other
setw -g window-status-bell-style "fg=colour232,bg=colour208,bold"

# --- Pane borders ---
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
